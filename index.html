<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RegenX</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    header {
      margin-bottom: 30px;
    }

    .logo {
      width: 160px;
      height: auto;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin: 10px 0;
    }

    p {
      font-size: 1.1rem;
      opacity: 0.8;
      max-width: 600px;
    }

    select {
      margin-top: 20px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
    }

    .content {
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <header>
    <img src="logo RengenX.png" alt="RegenX Logo" class="logo" />
    <h1 id="title">Bienvenue sur RegenX</h1>
    <p id="desc">
      Une nouvelle génération d'application pensée pour l'Europe, scalable, rapide et intelligente.
    </p>
  </header>

  <div class="content">
    <label for="lang">🌍 Langue :</label>
    <select id="lang" onchange="changeLang()">
      <option value="fr">Français</option>
      <option value="en">English</option>
      <option value="es">Español</option>
      <option value="pt">Português</option>
      <option value="de">Deutsch</option>
      <option value="it">Italiano</option>
    </select>
  </div>

  <script>
    const translations = {
      fr: {
        title: "Bienvenue sur RegenX",
        desc: "Une nouvelle génération d'application pensée pour l'Europe, scalable, rapide et intelligente."
      },
      en: {
        title: "Welcome to RegenX",
        desc: "A new generation of application built for Europe, scalable, fast and intelligent."
      },
      es: {
        title: "Bienvenido a RegenX",
        desc: "Una nueva generación de aplicación pensada para Europa, escalable, rápida e inteligente."
      },
      pt: {
        title: "Bem-vindo ao RegenX",
        desc: "Uma nova geração de aplicação pensada para a Europa, escalável, rápida e inteligente."
      },
      de: {
        title: "Willkommen bei RegenX",
        desc: "Eine neue Generation von Anwendungen für Europa, skalierbar, schnell und intelligent."
      },
      it: {
        title: "Benvenuto su RegenX",
        desc: "Una nuova generazione di applicazioni pensata per l’Europa, scalabile, veloce e intelligente."
      }
    };

    function changeLang() {
      const lang = document.getElementById("lang").value;

      document.getElementById("title").innerText = translations[lang].title;
      document.getElementById("desc").innerText = translations[lang].desc;
    }
  </script>

</body>
</html>
